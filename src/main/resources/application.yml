server:
  port: 8080

spring:
  application:
    name: betting-engine-kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    consumer:
      group-id: betting-engine-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    listener:
      ack-mode: record
      missing-topics-fatal: false

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: betting-engine-producer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

app:
  messaging:
    topics:
      event-outcomes: event-outcomes
      bet-settlements: bet-settlements
  ignite:
    addresses: ${IGNITE_ADDRESSES:localhost:10800}
    zone-name: ${IGNITE_ZONE_NAME:BETTING_ENGINE_ZONE}
    storage-profile: ${IGNITE_STORAGE_PROFILE:default_aimem}
    zone-partitions: ${IGNITE_ZONE_PARTITIONS:8}
    zone-replicas: ${IGNITE_ZONE_REPLICAS:1}
    bet-table-name: ${IGNITE_BET_TABLE_NAME:BETS}
    settlement-claim-table-name: ${IGNITE_SETTLEMENT_CLAIM_TABLE_NAME:SETTLEMENT_CLAIMS}
    settlement-claim-ttl: ${IGNITE_SETTLEMENT_CLAIM_TTL:30m}
