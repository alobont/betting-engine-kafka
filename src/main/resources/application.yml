server:
  port: 8080

spring:
  application:
    name: betting-engine-kafka
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    consumer:
      group-id: betting-engine-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    listener:
      ack-mode: record
      missing-topics-fatal: false

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: betting-engine-producer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

app:
  messaging:
    topics:
      event-outcomes: event-outcomes
      bet-settlements: bet-settlements
  redis:
    bet-key-prefix: bets
    event-index-prefix: bets-by-event
    settlement-key-prefix: settlement-claims
    settlement-claim-ttl: 30m
