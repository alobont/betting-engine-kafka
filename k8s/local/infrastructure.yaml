apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
data:
  server.properties: |
    process.roles=broker,controller
    node.id=1
    controller.quorum.voters=1@kafka:9093
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=PLAINTEXT://kafka:9092
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=PLAINTEXT
    num.partitions=1
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    group.initial.rebalance.delay.ms=0
    auto.create.topics.enable=true
    log.dirs=/var/lib/kafka/data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_HEAP_OPTS
              value: -Xms256m -Xmx256m
          ports:
            - containerPort: 9092
            - containerPort: 9093
          command:
            - /bin/sh
            - -lc
          args:
            - |
              if [ ! -f /var/lib/kafka/data/meta.properties ]; then
                /opt/kafka/bin/kafka-storage.sh format -t fEDUwhHpSy6mGFjEtqf7BA -c /opt/kafka/config/kraft/server.properties --ignore-formatted;
              fi;
              exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties
          volumeMounts:
            - name: kafka-config
              mountPath: /opt/kafka/config/kraft/server.properties
              subPath: server.properties
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-config
          configMap:
            name: kafka-config
        - name: kafka-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rocketmq-broker-config
data:
  broker.conf: |
    brokerClusterName=DefaultCluster
    brokerName=broker-a
    brokerId=0
    deleteWhen=04
    fileReservedTime=48
    brokerRole=ASYNC_MASTER
    flushDiskType=ASYNC_FLUSH
    autoCreateTopicEnable=true
    listenPort=10911
    namesrvAddr=rocketmq-nameserver:9876
    brokerIP1=rocketmq-broker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-nameserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-nameserver
  template:
    metadata:
      labels:
        app: rocketmq-nameserver
    spec:
      containers:
        - name: rocketmq-nameserver
          image: apache/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          args:
            - nameserver
          env:
            - name: JAVA_OPT_EXT
              value: -server -Xms256m -Xmx256m -Xmn128m
          ports:
            - containerPort: 9876
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-nameserver
spec:
  selector:
    app: rocketmq-nameserver
  ports:
    - port: 9876
      targetPort: 9876
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
  template:
    metadata:
      labels:
        app: rocketmq-broker
    spec:
      containers:
        - name: rocketmq-broker
          image: apache/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          args:
            - broker
            - -c
            - /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
          env:
            - name: JAVA_OPT_EXT
              value: -server -Xms256m -Xmx256m -Xmn128m
          ports:
            - containerPort: 10911
            - containerPort: 10909
          volumeMounts:
            - name: broker-config
              mountPath: /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
              subPath: broker.conf
            - name: broker-store
              mountPath: /home/rocketmq/store
      volumes:
        - name: broker-config
          configMap:
            name: rocketmq-broker-config
        - name: broker-store
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
spec:
  selector:
    app: rocketmq-broker
  ports:
    - name: remoting
      port: 10911
      targetPort: 10911
    - name: fast-remoting
      port: 10909
      targetPort: 10909
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ignite
spec:
  serviceName: ignite
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: ignite
  template:
    metadata:
      labels:
        app: ignite
    spec:
      containers:
        - name: ignite
          image: apacheignite/ignite:3.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3344
            - containerPort: 10300
            - containerPort: 10800
          command:
            - sh
            - -lc
          args:
            - |
              mkdir -p /var/lib/ignite/config /var/lib/ignite/work;
              cp /config/ignite-config.conf /var/lib/ignite/config/ignite-config.conf;
              exec docker-entrypoint.sh \
                --config-path /var/lib/ignite/config/ignite-config.conf \
                --work-dir /var/lib/ignite/work \
                --node-name ${HOSTNAME}
          readinessProbe:
            tcpSocket:
              port: 10300
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 10300
            initialDelaySeconds: 40
            periodSeconds: 15
          volumeMounts:
            - name: ignite-config
              mountPath: /config
            - name: ignite-data
              mountPath: /var/lib/ignite
      volumes:
        - name: ignite-config
          configMap:
            name: ignite-config
        - name: ignite-data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ignite-config
data:
  ignite-config.conf: |
    ignite {
      network {
        port=3344
        nodeFinder {
          type=STATIC
          netClusterNodes=[
            "ignite-0.ignite:3344"
          ]
        }
      }
      clientConnector {
        port=10800
      }
      rest {
        port=10300
      }
      storage.profiles {
        default_aimem {
          engine=aimem
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ignite
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: ignite
  ports:
    - name: cluster
      port: 3344
      targetPort: 3344
    - name: rest
      port: 10300
      targetPort: 10300
    - name: client
      port: 10800
      targetPort: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: ignite-client
spec:
  type: NodePort
  selector:
    app: ignite
  ports:
    - name: client
      port: 10800
      targetPort: 10800
      nodePort: 30082
