apiVersion: v1
kind: ConfigMap
metadata:
  name: rocketmq-broker-a-master-config
data:
  broker.conf: |
    brokerClusterName=DefaultCluster
    brokerName=broker-a
    brokerId=0
    deleteWhen=04
    fileReservedTime=48
    brokerRole=SYNC_MASTER
    flushDiskType=SYNC_FLUSH
    autoCreateTopicEnable=true
    listenPort=10911
    haListenPort=10912
    namesrvAddr=rocketmq-nameserver-0.rocketmq-nameserver:9876;rocketmq-nameserver-1.rocketmq-nameserver:9876
    brokerIP1=rocketmq-broker-a-master
    brokerIP2=rocketmq-broker-a-master
