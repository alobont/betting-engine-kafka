apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: kafka
                topologyKey: kubernetes.io/hostname
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_CLUSTER_ID
              value: fEDUwhHpSy6mGFjEtqf7BA
            - name: KAFKA_HEAP_OPTS
              value: -Xms256m -Xmx256m
          ports:
            - containerPort: 9092
            - containerPort: 9093
          command:
            - /bin/sh
            - -lc
          args:
            - |
              NODE_ID=$(( ${HOSTNAME##*-} + 1 ));
              cat <<EOF >/tmp/server.properties
              process.roles=broker,controller
              node.id=${NODE_ID}
              controller.quorum.voters=1@kafka-0.kafka-headless:9093,2@kafka-1.kafka-headless:9093,3@kafka-2.kafka-headless:9093
              listeners=PLAINTEXT://:9092,CONTROLLER://:9093
              advertised.listeners=PLAINTEXT://${HOSTNAME}.kafka-headless:9092
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              controller.listener.names=CONTROLLER
              inter.broker.listener.name=PLAINTEXT
              num.partitions=3
              default.replication.factor=3
              min.insync.replicas=2
              offsets.topic.replication.factor=3
              offsets.topic.num.partitions=3
              transaction.state.log.replication.factor=3
              transaction.state.log.min.isr=2
              group.initial.rebalance.delay.ms=0
              auto.create.topics.enable=true
              log.dirs=/var/lib/kafka/data
              EOF
              if [ ! -f /var/lib/kafka/data/meta.properties ]; then
                /opt/kafka/bin/kafka-storage.sh format -t ${KAFKA_CLUSTER_ID} -c /tmp/server.properties --ignore-formatted;
              fi;
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 40
            periodSeconds: 15
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ignite
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: ignite
  ports:
    - name: cluster
      port: 3344
      targetPort: 3344
    - name: rest
      port: 10300
      targetPort: 10300
    - name: client
      port: 10800
      targetPort: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: ignite-client
spec:
  type: NodePort
  selector:
    app: ignite
  ports:
    - name: client
      port: 10800
      targetPort: 10800
      nodePort: 30082
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ignite-config
data:
  ignite-config.conf: |
    ignite {
      network {
        port=3344
        nodeFinder {
          type=STATIC
          netClusterNodes=[
            "ignite-0.ignite:3344",
            "ignite-1.ignite:3344",
            "ignite-2.ignite:3344"
          ]
        }
      }
      clientConnector {
        port=10800
      }
      rest {
        port=10300
      }
      storage.profiles {
        default_aimem {
          engine=aimem
        }
      }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ignite
spec:
  serviceName: ignite
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: ignite
  template:
    metadata:
      labels:
        app: ignite
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ignite
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ignite
          image: apacheignite/ignite:3.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3344
            - containerPort: 10300
            - containerPort: 10800
          command:
            - sh
            - -lc
          args:
            - |
              mkdir -p /var/lib/ignite/config /var/lib/ignite/work;
              cp /config/ignite-config.conf /var/lib/ignite/config/ignite-config.conf;
              exec docker-entrypoint.sh \
                --config-path /var/lib/ignite/config/ignite-config.conf \
                --work-dir /var/lib/ignite/work \
                --node-name ${HOSTNAME}
          readinessProbe:
            tcpSocket:
              port: 10300
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 10300
            initialDelaySeconds: 40
            periodSeconds: 15
          volumeMounts:
            - name: ignite-config
              mountPath: /config
            - name: ignite-data
              mountPath: /var/lib/ignite
      volumes:
        - name: ignite-config
          configMap:
            name: ignite-config
        - name: ignite-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-nameserver
spec:
  serviceName: rocketmq-nameserver
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: rocketmq-nameserver
  template:
    metadata:
      labels:
        app: rocketmq-nameserver
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rocketmq-nameserver
                topologyKey: kubernetes.io/hostname
      containers:
        - name: rocketmq-nameserver
          image: apache/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          args:
            - nameserver
          env:
            - name: JAVA_OPT_EXT
              value: -server -Xms256m -Xmx256m -Xmn128m
          ports:
            - containerPort: 9876
          readinessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
