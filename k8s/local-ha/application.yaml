apiVersion: apps/v1
kind: Deployment
metadata:
  name: betting-engine
spec:
  progressDeadlineSeconds: 900
  replicas: 1
  selector:
    matchLabels:
      app: betting-engine
  template:
    metadata:
      labels:
        app: betting-engine
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: betting-engine
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z kafka-bootstrap 9092; do sleep 2; done
        - name: wait-for-rocketmq
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z rocketmq-nameserver 9876; do sleep 2; done
        - name: wait-for-ignite
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z ignite-0.ignite 10800 && nc -z ignite-1.ignite 10800 && nc -z ignite-2.ignite 10800; do sleep 2; done
      containers:
        - name: betting-engine
          image: betting-engine:local
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_TOOL_OPTIONS
              value: -Xms128m -Xmx256m
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-bootstrap:9092
            - name: ROCKETMQ_NAME_SERVER
              value: rocketmq-nameserver-0.rocketmq-nameserver:9876;rocketmq-nameserver-1.rocketmq-nameserver:9876
            - name: IGNITE_ADDRESSES
              value: ignite-0.ignite:10800,ignite-1.ignite:10800,ignite-2.ignite:10800
            - name: IGNITE_ZONE_REPLICAS
              value: "3"
            - name: IGNITE_ZONE_PARTITIONS
              value: "16"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 120
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 240
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: betting-engine
spec:
  selector:
    app: betting-engine
  ports:
    - port: 8080
      targetPort: 8080
